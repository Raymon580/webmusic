{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
        <link href="{% static 'audify/styles.css' %}?ver = 1.0.2" rel="stylesheet">
    </head>

    <body>
        <!--DESKTOP-->
        <div class="d-none d-lg-block">
            <div id="wholeCanvas">
                <div class="leftCanvas">
                    Home
                </div>

                <div class="rightCanvas">
                    <nav class="navbar navbar-expand-lg">
    
                        <div class="container-fluid">
                            <a class="navbar-brand" href="{% url 'index' %}">Audify</a>
                            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                                <span class="navbar-toggler-icon"></span>
                            </button>
    
                            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                                    <form class="d-flex" role="search">
                                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                                        <button class="btn btn-outline-success" type="submit">Search</button>
                                    </form>
                                </ul>
    
                                <ul class="nav justify-content-end dropstart">
                                    <li class="nav-item dropdown">
                                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                            <img src="" alt="None" width="30" height="24">
                                        </a>
                                        <ul class="dropdown-menu dropdown_menu-9">
                                            <li><a class="dropdown-item" href="#">{{ user }}</a></li>
                                            <li><a class="dropdown-item" href="{% url 'logout' %}">Log Out</a></li>
                                        </ul>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </nav>
    
                    <div class="body">
                        {% block desktop %}
                        {% endblock %}
                    </div>
                </div>
            </div>

            <div id="clear"></div>
        </div>
        
        <!--MOBILE-->
        <div class="d-lg-none">
            <nav class="navbar fixed-top" style="position: relative;">

                <div class="container-fluid">
                    <div id="navIcon">
                        <div id="leftNavIcon">
                            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar">
                                <span class="navbar-toggler-icon"></span>
                            </button>
                        </div>

                        <div id="rightNavIcon">
                            <a class="navbar-brand" href="{% url 'index' %}">Audify</a>
                        </div>
                    </div>

                    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">

                        <div class="offcanvas-header">
                            <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                        </div>

                        <div class="offcanvas-body">
                            <form class="d-flex" role="search">
                                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                                <button class="btn btn-outline-success" type="submit">Search</button>
                            </form>

                            <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                                <li class="nav-item dropdown">
                                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                        <img src="" alt="None" width="30" height="24">
                                    </a>
                                    <ul class="dropdown-menu dropdown_menu-9">
                                        <li><a class="dropdown-item" href="#">{{ user }}</a></li>
                                        <li><a class="dropdown-item" href="{% url 'logout' %}">Log Out</a></li>
                                    </ul>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="body">
                {% block mobile %}
                {% endblock %}
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa" crossorigin="anonymous"></script>
        {% block script %}
        {% endblock %}
    </body>
</html>
